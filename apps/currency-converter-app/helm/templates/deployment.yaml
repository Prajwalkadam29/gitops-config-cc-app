apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }}

      # ---------------------------------------------------------
      # POD SECURITY CONTEXT (Kyverno Compliance)
      # ---------------------------------------------------------
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}

          # ---------------------------------------------------------
          # SECRETS INJECTION
          # Injects the Kubernetes Secret generated by ESO as environment
          # variables. Spring Boot will read CURRENCY_API_KEY from here.
          # ---------------------------------------------------------
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-api-secret-k8s

          # ---------------------------------------------------------
          # CONTAINER SECURITY CONTEXT (Kyverno Compliance)
          # ---------------------------------------------------------
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # ---------------------------------------------------------
          # VOLUME MOUNTS
          # Spring Boot's Tomcat requires a writable /tmp directory to start.
          # Because we enforce a readOnlyRootFilesystem above, we mount an
          # ephemeral memory volume here so it can boot securely.
          # ---------------------------------------------------------
          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume

          # ---------------------------------------------------------
          # HEALTH PROBES
          # ---------------------------------------------------------
          readinessProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: {{ .Values.health.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: {{ .Values.health.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      # Maps to the volumeMounts in the container block
      volumes:
        - name: tmp-volume
          emptyDir: {}