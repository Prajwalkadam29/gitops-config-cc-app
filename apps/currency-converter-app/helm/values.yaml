# values.yaml - Safe defaults shared by every environment.
# Environment-specific overrides (like changing the AWS secret name for prod)
# will happen in values-<env>.yaml

image:
  repository: 056926201860.dkr.ecr.ap-south-1.amazonaws.com/currency-converter-app
  tag: d3e337fe-27
  pullPolicy: IfNotPresent

replicaCount: 2
containerPort: 8080

# Custom application health endpoint
health:
  path: /health
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccountName: default

# ======================================================================
# SECRETS MANAGEMENT CONFIGURATION
# Used by templates/externalsecret.yaml to fetch the API key from AWS
# ======================================================================
externalSecrets:
  # The name of the secret as saved in AWS Secrets Manager
  awsSecretName: "dev/currency-converter/api-keys"
  # The JSON key inside that AWS secret containing the actual token string
  awsSecretProperty: "exchange_rate_api_key"